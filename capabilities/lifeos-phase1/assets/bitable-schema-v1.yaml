version: "v1"
date: "2026-04-11"
owner: "hiddenwangcc"
status: "draft"

tables:
  lifeos_events:
    purpose: "Human-facing event table for raw capture, first interpretation, and feedback snapshot, upgraded in place on the existing Agent 辅助我思考 table."
    sync_source: "lifeos_events + compatible legacy fields from payload_json + selected fields from lifeos_feedback_cards"
    recommended_key_field: "event_id"
    fields:
      - name: "event_id"
        type: "text"
      - name: "event_schema_version"
        type: "text"
      - name: "captured_at"
        type: "datetime"
      - name: "source"
        type: "text"
      - name: "source_meta_json"
        type: "text"
      - name: "raw_text"
        type: "text"
      - name: "event_type"
        type: "text"
      - name: "content_layers"
        type: "text"
      - name: "intensity"
        type: "text"
      - name: "fact_summary"
        type: "text"
      - name: "emotion_tags"
        type: "text"
      - name: "state_tags"
        type: "text"
      - name: "topic_tags"
        type: "text"
      - name: "need_tags"
        type: "text"
      - name: "intention_guess"
        type: "text"
      - name: "clarity_level"
        type: "single_select"
        options:
          - "低"
          - "中"
          - "高"
      - name: "special_flag"
        type: "text"
      - name: "output_mode"
        type: "single_select"
        options:
          - "仅记录"
          - "轻反馈"
          - "深洞察"
          - "周报池"
      - name: "needs"
        type: "text"
      - name: "routes_to"
        type: "text"
      - name: "weekly_bucket"
        type: "text"
      - name: "deep_review_candidate"
        type: "checkbox"
      - name: "instant_feedback"
        type: "text"
      - name: "insight_note"
        type: "text"
      - name: "agent_status_openclaw"
        type: "single_select"
        options:
          - "待处理"
          - "成功"
          - "失败"
          - "跳过"
      - name: "agent_status_hermes"
        type: "single_select"
        options:
          - "待处理"
          - "成功"
          - "失败"
          - "跳过"
      - name: "agent_status_research"
        type: "single_select"
        options:
          - "待处理"
          - "成功"
          - "失败"
          - "跳过"
      - name: "input_type"
        type: "single_select"
        options:
          - "内心感受/念头"
          - "人际触动"
          - "网络信息"
          - "读书"
          - "行动过程"
          - "冥想表达"
          - "客观事件记录"
      - name: "expression_form"
        type: "text"
      - name: "scene_type"
        type: "single_select"
        options:
          - "复盘"
          - "触动"
          - "灵感"
          - "情绪"
          - "启发"
          - "记录"
      - name: "signal_type"
        type: "single_select"
        options:
          - "灵感"
          - "问题"
          - "感受"
          - "判断"
          - "计划"
          - "纪实"
          - "试验"
      - name: "energy_state"
        type: "text"
      - name: "role_signals"
        type: "text"
      - name: "intentions"
        type: "text"
      - name: "assumptions"
        type: "text"
      - name: "meaning_functions"
        type: "text"
      - name: "idea_systems"
        type: "text"
      - name: "lifeos_routes"
        type: "text"
      - name: "handling_mode"
        type: "single_select"
        options:
          - "record"
          - "process"
          - "action"
          - "project"
          - "watch"
      - name: "importance_level"
        type: "single_select"
        options:
          - "low"
          - "medium"
          - "high"
      - name: "importance_reason"
        type: "text"
      - name: "feedback_mode"
        type: "single_select"
        options:
          - "record_only"
          - "light_feedback"
          - "dialogue_invite"
      - name: "should_continue_dialogue"
        type: "checkbox"
      - name: "related_module_ids"
        type: "text"
      - name: "heard_summary"
        type: "text"
      - name: "card_title"
        type: "text"
      - name: "card_subtitle"
        type: "text"
      - name: "next_step_suggestion"
        type: "text"
      - name: "followup_question"
        type: "text"
      - name: "archive_markdown_path"
        type: "text"

  lifeos_modules:
    purpose: "Human-facing module ledger for system objects under construction."
    sync_source: "lifeos_modules"
    recommended_key_field: "module_id"
    fields:
      - name: "module_id"
        type: "text"
      - name: "module_name"
        type: "text"
      - name: "module_type"
        type: "single_select"
        options:
          - "meta"
          - "domain"
      - name: "current_status"
        type: "single_select"
        options:
          - "idea"
          - "defined"
          - "designing"
          - "trial_running"
          - "stable_running"
          - "blocked"
          - "upgrade_needed"
          - "paused"
      - name: "module_goal"
        type: "text"
      - name: "problem_to_solve"
        type: "text"
      - name: "why_it_matters"
        type: "text"
      - name: "related_idea_systems"
        type: "text"
      - name: "related_lifeos_routes"
        type: "text"
      - name: "current_blockers"
        type: "text"
      - name: "next_action"
        type: "text"
      - name: "acceptance_criteria"
        type: "text"
      - name: "review_cycle"
        type: "text"
      - name: "last_reviewed_at"
        type: "datetime"
      - name: "source_event_ids"
        type: "text"
      - name: "notes_md_path"
        type: "text"

sync_rules:
  - "lifeos_events is Phase 1 mandatory."
  - "lifeos_modules is Phase 1 strongly recommended."
  - "Feedback log stays in SQLite first; only selected feedback fields sync into lifeos_events."
  - "Do not flatten raw_text away. Raw text must stay queryable in Feishu."
