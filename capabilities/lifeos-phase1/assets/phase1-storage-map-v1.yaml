version: "v1"
date: "2026-04-11"
owner: "hiddenwangcc"
status: "draft"

purpose:
  - "Turn the communication chain into explicit persistence layers."
  - "Make Hermes and human collaborators share the same storage mental model."
  - "Define which table owns which part of the LifeOS process."

communication_chain:
  - step: "raw_capture"
    question: "我当时到底说了什么？"
    table: "lifeos_events"
    required_fields:
      - "event_id"
      - "captured_at"
      - "source"
      - "source_meta_json"
      - "raw_text"
      - "raw_links_json"
      - "raw_context_json"
  - step: "first_interpretation"
    question: "Hermes 第一轮怎么理解这条内容？"
    table: "lifeos_events"
    required_fields:
      - "event_type"
      - "input_type"
      - "expression_form"
      - "scene_type"
      - "signal_type"
      - "emotion_tags_json"
      - "energy_state"
      - "role_signals_json"
      - "need_signals_json"
      - "intention_signals_json"
      - "assumption_signals_json"
      - "meaning_functions_json"
      - "idea_systems_json"
      - "lifeos_routes_json"
      - "handling_mode"
      - "importance_level"
      - "importance_reason"
      - "feedback_mode"
      - "should_continue_dialogue"
  - step: "instant_feedback"
    question: "Hermes 当时怎么接住、怎么反馈？"
    table: "lifeos_feedback_cards"
    required_fields:
      - "feedback_id"
      - "event_id"
      - "feedback_mode"
      - "card_title"
      - "card_subtitle"
      - "heard_summary"
      - "core_signal"
      - "insight_note"
      - "next_step_suggestion"
      - "followup_question"
      - "closing_quote"
      - "card_payload_json"
  - step: "module_object"
    question: "这条内容推动了哪个系统对象？"
    table: "lifeos_modules"
    required_fields:
      - "module_id"
      - "module_name"
      - "module_type"
      - "current_status"
      - "module_goal"
      - "problem_to_solve"
      - "current_blockers"
      - "next_action"
      - "acceptance_criteria"
      - "source_event_ids_json"
  - step: "route_decision"
    question: "这条内容后来被送到哪里？"
    table: "lifeos_routes"
    required_fields:
      - "route_id"
      - "event_id"
      - "primary_route"
      - "secondary_routes_json"
      - "target_module_ids_json"
      - "target_systems_json"
      - "route_reason"
      - "execution_status"
  - step: "supervision_loop"
    question: "模块后来有没有被真正盯住、推进、复查？"
    table: "lifeos_supervisions"
    required_fields:
      - "supervision_id"
      - "module_id"
      - "supervision_status"
      - "current_focus"
      - "blocker_summary"
      - "progress_note"
      - "next_checkpoint"
      - "supervision_action"

write_policy:
  raw_capture:
    rule: "Every input must be written before any routing or rendering."
  first_interpretation:
    rule: "Interpretation is additive and must never overwrite raw_text."
  instant_feedback:
    rule: "Only write when Hermes actually generates user-visible feedback."
  module_object:
    rule: "Only write when the content clearly updates or creates a system object."
  route_decision:
    rule: "Every event gets one primary route, optional secondary routes."
  supervision_loop:
    rule: "Only module-focused follow-up enters supervision records."

sync_policy:
  sqlite_role: "authoritative structured memory for Hermes runtime"
  markdown_role: "long-term semantic archive and restore surface"
  bitable_role: "human-readable filtering, workflow, and visual management"

notes:
  - "lifeos_events is the main event envelope table."
  - "lifeos_feedback_cards stores what Hermes actually sent back."
  - "lifeos_modules stores system objects, not chat transcripts."
  - "lifeos_routes and lifeos_supervisions make LifeOS operational instead of archival only."
